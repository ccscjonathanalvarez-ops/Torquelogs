<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torque Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .log-entry { font-family: monospace; font-size: 0.85rem; }
        .status-online { color: #28a745; font-weight: bold; }
        #refresh-btn { transition: all 0.3s; }
        #refresh-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚗 Torque Pro Data Capture</span>
            <span class="status-online">● Servidor Activo</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <button id="refresh-btn" class="btn btn-primary btn-lg">
                    🔄 Actualizar Datos
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Registros Capturados</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha/Hora</th>
                                <th>IP Remota</th>
                                <th>Parámetros (PIDs)</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Los datos se cargarán aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '⌛ Cargando...';

            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                const body = document.getElementById('logs-body');
                body.innerHTML = '';

                data.reverse().forEach(log => {
                    const row = document.createElement('tr');
                    
                    // Formatear parámetros para que sean legibles
                    const params = Object.entries(log.args)
                        .map(([k, v]) => `<span class="badge bg-secondary me-1">${k}: ${v}</span>`)
                        .join(' ');

                    row.innerHTML = `
                        <td>${new Date(log.timestamp).toLocaleString()}</td>
                        <td><small class="text-muted">${log.remote_addr}</small></td>
                        <td class="log-entry">${params || '<span class="text-muted">Sin datos</span>'}</td>
                    `;
                    body.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching logs:', error);
                alert('Error al cargar los datos');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 Actualizar Datos';
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', fetchLogs);

        // Cargar datos al iniciar
        fetchLogs();

        // Actualización automática cada 30 segundos
        setInterval(fetchLogs, 30000);
    </script>
</body>
</html>
