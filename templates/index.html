<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torque Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .log-entry { font-family: monospace; font-size: 0.85rem; }
        .status-online { color: #28a745; font-weight: bold; }
        #refresh-btn { transition: all 0.3s; }
        #refresh-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚗 Torque Pro Data Capture</span>
            <span class="status-online">● Servidor Activo</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <button id="refresh-btn" class="btn btn-primary btn-lg">
                    🔄 Actualizar Datos
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Registros Capturados</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Perfil (Vehículo)</th>
                                <th>Fecha/Hora</th>
                                <th>Sesión</th>
                                <th>Parámetros (PIDs)</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Los datos se cargarán aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '⌛ Cargando...';

            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                const body = document.getElementById('logs-body');
                body.innerHTML = '';

                // Mapeo para recordar qué Perfil pertenece a cada Sesión
                const sessionToProfile = {};
                let previousKeys = new Set();
                
                // 1. Procesar datos cronológicamente para mapear sesiones y detectar PIDs nuevos
                const processedData = data.map(log => {
                    // Rastrear nombre de perfil (se envía solo al inicio de la sesión)
                    if (log.args.profileName) {
                        sessionToProfile[log.args.session] = log.args.profileName;
                    }

                    // Detectar llaves nuevas (PIDs)
                    const currentKeys = new Set(Object.keys(log.args).filter(k => 
                        !['id', 'session', 'profileName', 'eml', 'v'].includes(k)
                    ));
                    const newKeys = new Set([...currentKeys].filter(k => !previousKeys.has(k)));
                    previousKeys = currentKeys;

                    return { ...log, _newKeys: newKeys };
                });

                // 2. Renderizar del más nuevo al más antiguo
                processedData.reverse().forEach(log => {
                    const row = document.createElement('tr');
                    
                    // Recuperar el nombre del perfil desde nuestro mapa de sesiones
                    const profileName = sessionToProfile[log.args.session] || '---';
                    const sessionId = log.args.session || '---';

                    // Filtrar parámetros técnicos para la lista de PIDs
                    const displayArgs = { ...log.args };
                    ['id', 'session', 'profileName', 'eml', 'v'].forEach(k => delete displayArgs[k]);

                    const params = Object.entries(displayArgs)
                        .map(([k, v]) => {
                            const isNew = log._newKeys.has(k);
                            const badgeClass = isNew ? 'bg-success' : 'bg-secondary';
                            return `<span class="badge ${badgeClass} me-1" title="Valor: ${v}">${k}: ${v}</span>`;
                        })
                        .join(' ');

                    row.innerHTML = `
                        <td><strong class="text-primary">${profileName}</strong></td>
                        <td><small>${new Date(log.timestamp).toLocaleString()}</small></td>
                        <td><span class="badge bg-light text-dark border">${sessionId}</span></td>
                        <td class="log-entry">${params || '<span class="text-muted">Sin datos de sensores</span>'}</td>
                    `;
                    body.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching logs:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 Actualizar Datos';
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', fetchLogs);
        fetchLogs();
        setInterval(fetchLogs, 30000);
    </script>
</body>
</html>
